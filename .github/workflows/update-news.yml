name: Update news and deploy

on:
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: news-pages
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Update weekly news
        run: npm run update:news

      - name: Commit news changes
        run: |
          git config user.name "ad-suzano-news-bot"
          git config user.email "actions@github.com"
          git add src/data/news.js
          if git diff --cached --quiet; then
            echo "No news changes to commit."
          else
            git commit -m "Update weekly news"
            git push
          fi

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-news
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
