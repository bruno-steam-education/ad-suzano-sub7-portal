name: Update FPFS, category news and deploy

on:
  schedule:
    - cron: '30 9 * * *'
    - cron: '30 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: news-pages
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Update FPFS, club site, and category news
        run: |
          npm run update:fpfs
          npm run sync:club-site
          npm run update:news
          npm run audit:robots

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Commit data changes
        run: |
          git config user.name "ad-suzano-news-bot"
          git config user.email "actions@github.com"
          git add src/data/news.js src/data/fpfsCategories.js src/data/clubSite.js
          if git diff --cached --quiet; then
            echo "No FPFS, news or club site changes to commit."
          else
            git commit -m "Update FPFS, news, and club site data"
            git push || echo "Warning: Direct push to main branch failed (possibly due to branch protection rules). The site has been successfully built and deployed with the latest data, but changes were not saved back to the git history."
          fi

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-data
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
